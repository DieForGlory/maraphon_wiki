services:
  backend:
    build: ./backend
    restart: always
    volumes:
      - ./backend/instance:/app/instance
      - ./backend/app/static/uploads:/app/app/static/uploads
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "5000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend